<h1>Admission Form</h1>

<form class="admission-form">

<label>Full Name</label><br>
<input type="text" placeholder="Enter your full name" required><br><br>

<label>Date of Birth</label><br>
<input type="date" required><br><br>

<label>Gender</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email" required><br><br>

<label>Mobile Number</label><br>
<input type="tel" placeholder="Enter your mobile number" required><br><br>

<label>Address</label><br>
<textarea rows="4" placeholder="Enter your address"></textarea><br><br>

<label>Select Course</label><br>
<select>
    <option>BBA</option>
    <option>BCA</option>
    <option>B.Com</option>
    <option>MBA</option>
</select><br><br>

<label>Upload Passport Photo</label><br>
<input type="file"><br><br>

<input type="submit" value="Apply Now">

</form>
